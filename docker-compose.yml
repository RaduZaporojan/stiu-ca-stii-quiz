services:
  stiucastii-db:
    image: postgres:16
    container_name: stiucastii-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stiucastii}
      POSTGRES_USER: ${POSTGRES_USER:-stiucastii_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stiucastii_password}
    ports:
      - "5432:5432"
    volumes:
      - stiucastii_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stiucastii_user} -d ${POSTGRES_DB:-stiucastii}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stiucastii_postgres_data:
