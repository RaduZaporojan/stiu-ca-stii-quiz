services:
  stiucastii-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stiucastii}
      POSTGRES_USER: ${POSTGRES_USER:-stiucastii_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - stiucastii_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stiucastii_user} -d ${POSTGRES_DB:-stiucastii}"]
      interval: 10s
      timeout: 5s
      retries: 5

  stiucastii-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      stiucastii-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://stiucastii.owh.md}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "3010:3000"

volumes:
  stiucastii_postgres_data:
